name: Handoff verification gates

on:
  workflow_call:
    inputs:
      ref:
        required: false
        type: string

jobs:
  typescript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.sha }}
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.sha }}
      - uses: actions/setup-go@v5
        with:
          go-version: 1.26.1
          cache-dependency-path: server/go.sum
      - run: cd server && go test ./...
  deployment:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.sha }}
      - uses: azure/setup-helm@v4
      - run: deploy/jke/scripts/validate-deployment.sh
