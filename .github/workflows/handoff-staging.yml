name: Handoff staging

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Commit SHA to build (must be a full SHA)
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: handoff-staging
  cancel-in-progress: false

jobs:
  verify:
    uses: ./.github/workflows/handoff-verify.yml
    with:
      ref: ${{ inputs.ref }}

  build:
    needs: verify
    runs-on: ubuntu-latest
    outputs:
      backend_digest: ${{ steps.backend.outputs.digest }}
      frontend_digest: ${{ steps.frontend.outputs.digest }}
    steps:
      - name: Validate immutable ref
        env:
          BUILD_REF: ${{ inputs.ref }}
        run: '[[ "$BUILD_REF" =~ ^[0-9a-f]{40}$ ]]'
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: oxygent-cn-north-1.jcr.service.jdcloud.com
          username: ${{ secrets.HANDOFF_REGISTRY_USERNAME }}
          password: ${{ secrets.HANDOFF_REGISTRY_PASSWORD }}
      - name: Build backend
        id: backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: oxygent-cn-north-1.jcr.service.jdcloud.com/oxygent/multica-backend:sha-${{ inputs.ref }}
          build-args: |
            VERSION=handoff-${{ inputs.ref }}
            COMMIT=${{ inputs.ref }}
      - name: Build frontend
        id: frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.web
          push: true
          tags: oxygent-cn-north-1.jcr.service.jdcloud.com/oxygent/multica-web:sha-${{ inputs.ref }}
          build-args: |
            REMOTE_API_URL=http://backend:8080
            NEXT_PUBLIC_APP_VERSION=handoff-${{ inputs.ref }}

  deploy:
    needs: build
    runs-on: [self-hosted, handoff-staging]
    environment: handoff-staging
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}
      - name: Atomic staging deploy and smoke
        run: deploy/jke/scripts/deploy-handoff.sh staging '${{ needs.build.outputs.backend_digest }}' '${{ needs.build.outputs.frontend_digest }}'
      - name: Codex canary
        env:
          AGENT_ID: ${{ secrets.STAGING_CODEX_AGENT_ID }}
        run: deploy/jke/scripts/run-agent-canary.sh staging "$AGENT_ID"
      - name: Claude canary
        env:
          AGENT_ID: ${{ secrets.STAGING_CLAUDE_AGENT_ID }}
        run: deploy/jke/scripts/run-agent-canary.sh staging "$AGENT_ID"
      - name: Record qualified digests
        run: |
          jq -n --arg commit '${{ inputs.ref }}' \
            --arg backend '${{ needs.build.outputs.backend_digest }}' \
            --arg frontend '${{ needs.build.outputs.frontend_digest }}' \
            '{commit:$commit,backend_digest:$backend,frontend_digest:$frontend}' > qualified-images.json
      - uses: actions/upload-artifact@v4
        with:
          name: handoff-qualified-${{ inputs.ref }}
          path: qualified-images.json
          retention-days: 30
