name: Handoff Desktop Build

on:
  push:
    branches:
      - codex/handoff-desktop-20260717

permissions:
  contents: read

jobs:
  mac-arm64:
    runs-on: macos-14
    timeout-minutes: 45
    env:
      MULTICA_DESKTOP_DEFAULT_API_URL: https://handoff.oxygent.org.cn
      MULTICA_DESKTOP_BUILD_VERSION: 0.4.1-handoff.1
      MULTICA_DESKTOP_UPDATE_FEED_URL: https://multica-handoff-downloads.s3.cn-north-1.jdcloud-oss.com/desktop/macos/arm64/
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
      DMG_UPLOAD_URL_B64: 
      DMG_BLOCKMAP_UPLOAD_URL_B64: 
      ZIP_UPLOAD_URL_B64: 
      ZIP_BLOCKMAP_UPLOAD_URL_B64: 
      UPDATE_YML_UPLOAD_URL_B64: 

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod
          cache-dependency-path: server/go.sum

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Package self-hosted macOS ARM64 client
        working-directory: apps/desktop
        run: node scripts/package.mjs --mac --arm64 --publish never

      - name: Upload installers to private staging keys
        working-directory: apps/desktop
        shell: bash
        run: |
          set -euo pipefail
          version="$MULTICA_DESKTOP_BUILD_VERSION"

          upload() {
            local path="$1"
            local encoded_url="$2"
            local content_type="$3"
            if [[ ! -f "$path" ]]; then
              echo "optional artifact missing: $path"
              return 0
            fi
            local url
            url="$(printf '%s' "$encoded_url" | base64 --decode)"
            curl --fail --show-error --silent --retry 3 \
              -X PUT \
              -H "Content-Type: $content_type" \
              -H "x-amz-acl: public-read" \
              --upload-file "$path" \
              "$url"
          }

          upload "dist/multica-desktop-${version}-mac-arm64.dmg" "$DMG_UPLOAD_URL_B64" "application/x-apple-diskimage"
          upload "dist/multica-desktop-${version}-mac-arm64.dmg.blockmap" "$DMG_BLOCKMAP_UPLOAD_URL_B64" "application/octet-stream"
          upload "dist/multica-desktop-${version}-mac-arm64.zip" "$ZIP_UPLOAD_URL_B64" "application/zip"
          upload "dist/multica-desktop-${version}-mac-arm64.zip.blockmap" "$ZIP_BLOCKMAP_UPLOAD_URL_B64" "application/octet-stream"
          upload "dist/latest-mac.yml" "$UPDATE_YML_UPLOAD_URL_B64" "application/octet-stream"

      - uses: actions/upload-artifact@v4
        with:
          name: handoff-desktop-mac-arm64
          path: apps/desktop/dist
          if-no-files-found: error
