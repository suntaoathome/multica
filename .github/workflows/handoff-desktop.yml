name: Handoff Desktop Build

on:
  push:
    branches:
      - codex/handoff-desktop-20260717

permissions:
  contents: write

jobs:
  mac-arm64:
    runs-on: macos-14
    timeout-minutes: 45
    env:
      MULTICA_DESKTOP_DEFAULT_API_URL: https://handoff.oxygent.org.cn
      MULTICA_DESKTOP_BUILD_VERSION: 0.4.1-handoff.1
      CSC_IDENTITY_AUTO_DISCOVERY: "false"

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod
          cache-dependency-path: server/go.sum

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Package self-hosted macOS ARM64 client
        working-directory: apps/desktop
        run: node scripts/package.mjs --mac --arm64 --publish never

      - name: Publish self-hosted desktop prerelease
        working-directory: apps/desktop
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          version="$MULTICA_DESKTOP_BUILD_VERSION"
          tag="handoff-desktop-v0.4.1-1"
          gh release delete "$tag" --cleanup-tag --yes || true
          gh release create "$tag" \
            "dist/multica-desktop-${version}-mac-arm64.dmg" \
            "dist/multica-desktop-${version}-mac-arm64.zip" \
            --target "$GITHUB_SHA" \
            --title "Multica Handoff Desktop v0.4.1" \
            --notes "Self-hosted macOS Apple Silicon client for https://handoff.oxygent.org.cn" \
            --prerelease

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: handoff-desktop-mac-arm64
          path: apps/desktop/dist
          if-no-files-found: error
