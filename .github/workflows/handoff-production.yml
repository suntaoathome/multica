name: Handoff production promotion

on:
  workflow_dispatch:
    inputs:
      commit_sha:
        description: Staging-qualified full commit SHA
        required: true
        type: string
      staging_run_id:
        description: Successful Handoff staging workflow run ID
        required: true
        type: string
      confirm:
        description: Type PROMOTE_HANDOFF_PRODUCTION
        required: true
        type: string

permissions:
  actions: read
  contents: read

concurrency:
  group: handoff-production
  cancel-in-progress: false

jobs:
  promote:
    if: inputs.confirm == 'PROMOTE_HANDOFF_PRODUCTION'
    runs-on: [self-hosted, handoff-production]
    environment: handoff-production
    steps:
      - name: Validate inputs
        env:
          COMMIT_SHA: ${{ inputs.commit_sha }}
          STAGING_RUN_ID: ${{ inputs.staging_run_id }}
        run: |
          [[ "$COMMIT_SHA" =~ ^[0-9a-f]{40}$ ]]
          [[ "$STAGING_RUN_ID" =~ ^[0-9]+$ ]]
      - name: Verify staging qualification run
        uses: actions/github-script@v7
        env:
          COMMIT_SHA: ${{ inputs.commit_sha }}
          STAGING_RUN_ID: ${{ inputs.staging_run_id }}
        with:
          script: |
            const runId = Number(process.env.STAGING_RUN_ID)
            const { data: run } = await github.rest.actions.getWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: runId,
            })
            if (run.path !== '.github/workflows/handoff-staging.yml') {
              core.setFailed(`run ${runId} is ${run.path}, not Handoff staging`)
            }
            if (run.conclusion !== 'success' || run.head_sha !== process.env.COMMIT_SHA) {
              core.setFailed(`run ${runId} is not a successful qualification for ${process.env.COMMIT_SHA}`)
            }
      - name: Download staging qualification record
        uses: actions/download-artifact@v4
        with:
          name: handoff-qualified-${{ inputs.commit_sha }}
          path: qualification
          github-token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          run-id: ${{ inputs.staging_run_id }}
      - name: Validate qualification record
        id: qualification
        env:
          COMMIT_SHA: ${{ inputs.commit_sha }}
        run: |
          jq -e --arg commit "$COMMIT_SHA" '
            .commit == $commit and
            (.backend_digest | test("^sha256:[0-9a-f]{64}$")) and
            (.frontend_digest | test("^sha256:[0-9a-f]{64}$"))
          ' qualification/qualified-images.json >/dev/null
          echo "backend_digest=$(jq -r .backend_digest qualification/qualified-images.json)" >> "$GITHUB_OUTPUT"
          echo "frontend_digest=$(jq -r .frontend_digest qualification/qualified-images.json)" >> "$GITHUB_OUTPUT"
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.commit_sha }}
      - name: Promote exact staging digests
        run: deploy/jke/scripts/deploy-handoff.sh production '${{ steps.qualification.outputs.backend_digest }}' '${{ steps.qualification.outputs.frontend_digest }}' --confirm-production
