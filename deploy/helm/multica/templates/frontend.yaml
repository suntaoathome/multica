{{- $frontendImageTag := default .Chart.AppVersion .Values.images.frontend.tag -}}
{{- $frontendImage := printf "%s:%s" .Values.images.frontend.repository $frontendImageTag -}}
{{- with .Values.images.frontend.digest }}
{{- $frontendImage = printf "%s@%s" $.Values.images.frontend.repository . -}}
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "multica.frontend.fullname" . }}
  labels:
    {{- include "multica.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  replicas: {{ .Values.frontend.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: multica
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: frontend
  template:
    metadata:
      labels:
        {{- include "multica.labels" . | nindent 8 }}
        app.kubernetes.io/component: frontend
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: frontend
          image: {{ $frontendImage | quote }}
          imagePullPolicy: {{ .Values.images.frontend.pullPolicy }}
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: HOSTNAME
              value: "0.0.0.0"
            - name: PORT
              value: "3000"
            {{- with .Values.frontend.config.nodeOptions }}
            - name: NODE_OPTIONS
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.frontend.config.desktopDownloads }}
            {{- with .version }}
            - name: MULTICA_DESKTOP_DOWNLOAD_VERSION
              value: {{ . | quote }}
            {{- end }}
            {{- with .macArm64DmgUrl }}
            - name: MULTICA_DESKTOP_DOWNLOAD_MAC_ARM64_DMG_URL
              value: {{ . | quote }}
            {{- end }}
            {{- with .macArm64ZipUrl }}
            - name: MULTICA_DESKTOP_DOWNLOAD_MAC_ARM64_ZIP_URL
              value: {{ . | quote }}
            {{- end }}
            {{- with .winX64ExeUrl }}
            - name: MULTICA_DESKTOP_DOWNLOAD_WIN_X64_EXE_URL
              value: {{ . | quote }}
            {{- end }}
            {{- with .winArm64ExeUrl }}
            - name: MULTICA_DESKTOP_DOWNLOAD_WIN_ARM64_EXE_URL
              value: {{ . | quote }}
            {{- end }}
            {{- with .linuxAmd64AppImageUrl }}
            - name: MULTICA_DESKTOP_DOWNLOAD_LINUX_AMD64_APPIMAGE_URL
              value: {{ . | quote }}
            {{- end }}
            {{- with .linuxAmd64DebUrl }}
            - name: MULTICA_DESKTOP_DOWNLOAD_LINUX_AMD64_DEB_URL
              value: {{ . | quote }}
            {{- end }}
            {{- with .linuxAmd64RpmUrl }}
            - name: MULTICA_DESKTOP_DOWNLOAD_LINUX_AMD64_RPM_URL
              value: {{ . | quote }}
            {{- end }}
            {{- with .linuxArm64AppImageUrl }}
            - name: MULTICA_DESKTOP_DOWNLOAD_LINUX_ARM64_APPIMAGE_URL
              value: {{ . | quote }}
            {{- end }}
            {{- with .linuxArm64DebUrl }}
            - name: MULTICA_DESKTOP_DOWNLOAD_LINUX_ARM64_DEB_URL
              value: {{ . | quote }}
            {{- end }}
            {{- with .linuxArm64RpmUrl }}
            - name: MULTICA_DESKTOP_DOWNLOAD_LINUX_ARM64_RPM_URL
              value: {{ . | quote }}
            {{- end }}
            {{- end }}
          startupProbe:
            tcpSocket:
              port: 3000
            failureThreshold: 30
            periodSeconds: 2
          readinessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            {{- toYaml .Values.frontend.resources | nindent 12 }}
      {{- with .Values.frontend.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.frontend.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "multica.frontend.fullname" . }}
  labels:
    {{- include "multica.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: multica
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: frontend
  ports:
    - port: 3000
      targetPort: 3000
      name: http
