apiVersion: v1
kind: Service
metadata:
  name: multica-backend-public
  namespace: multica
  labels:
    app.kubernetes.io/name: multica
    app.kubernetes.io/instance: multica
    app.kubernetes.io/component: backend-public
  annotations:
    service.beta.kubernetes.io/jdcloud-load-balancer-spec: |
      version: "v1"
      loadBalancerType: alb
      listeners:
        - protocol: "TCP"
spec:
  type: LoadBalancer
  selector:
    app.kubernetes.io/name: multica
    app.kubernetes.io/instance: multica
    app.kubernetes.io/component: backend
  ports:
    - name: http
      port: 80
      targetPort: 8080
