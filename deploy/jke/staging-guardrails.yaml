apiVersion: v1
kind: ResourceQuota
metadata:
  name: handoff-staging-quota
  namespace: handoff-staging
spec:
  hard:
    requests.cpu: "3"
    requests.memory: 5Gi
    limits.cpu: "6"
    limits.memory: 10Gi
    persistentvolumeclaims: "4"
    requests.storage: 100Gi
    services.loadbalancers: "1"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: handoff-staging-defaults
  namespace: handoff-staging
spec:
  limits:
    - type: Container
      defaultRequest:
        cpu: 50m
        memory: 64Mi
      default:
        cpu: "1"
        memory: 2Gi
